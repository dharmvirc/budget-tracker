name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x backend/gradlew

      - name: Build (compile + unit tests)
        working-directory: backend
        run: ./gradlew test --no-daemon

      - name: Integration tests (TestContainers spins PostgreSQL)
        working-directory: backend
        run: ./gradlew integrationTest --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/build/reports/tests/

  frontend:
    name: Frontend — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Unit & component tests
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build

  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Tesseract
        run: sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Start backend
        working-directory: backend
        run: ./gradlew bootRun --no-daemon &
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/budgettracker_test
          SPRING_DATASOURCE_USERNAME: budgettracker
          SPRING_DATASOURCE_PASSWORD: budgettracker

      - name: Start frontend
        working-directory: frontend
        run: npm run dev &

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Wait for services
        run: |
          npx wait-on http://localhost:8080/api/v1/health http://localhost:5173 --timeout 60000

      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:5173

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
